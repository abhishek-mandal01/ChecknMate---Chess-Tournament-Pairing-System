<script>
  // Only redirect to landing page on true browser refresh, not sidebar navigation
  (function() {
    var isReload = false;
    if (window.performance) {
      var navEntries = window.performance.getEntriesByType && window.performance.getEntriesByType('navigation');
      if (navEntries && navEntries.length > 0) {
        isReload = navEntries[0].type === 'reload';
      } else if (window.performance.navigation) {
        isReload = window.performance.navigation.type === 1;
      }
    }
    // Fallback: use sessionStorage to detect reload
    if (!isReload) {
      if (sessionStorage.getItem('justReloaded')) {
        isReload = true;
        sessionStorage.removeItem('justReloaded');
      }
    }
    // Only set flag if user is refreshing (not navigating via link)
    window.addEventListener('beforeunload', function(e) {
      // If referrer is empty or same as current page, treat as reload
      if (!document.referrer || document.referrer === window.location.href) {
        sessionStorage.setItem('justReloaded', '1');
      } else {
        sessionStorage.removeItem('justReloaded');
      }
    });
    if (isReload) {
      window.location.replace('index.html');
    }
  })();
</script>

<script>
function populateStandingsSelect() {
  apiRequest('/api/tournaments/all').then(function(list) {
    var sel = document.getElementById('standingsTournamentSelect');
    sel.innerHTML = '<option value="">-- Choose --</option>';
    var selectedId = localStorage.getItem('selectedTournamentId');
    for (var i = 0; i < list.length; i++) {
      var t = list[i];
      var opt = document.createElement('option');
      opt.value = t.id;
      opt.textContent = t.id + ' - ' + t.name + ' (' + t.format + ')';
      if (selectedId && String(t.id) === String(selectedId)) {
        opt.selected = true;
      }
      sel.appendChild(opt);
    }
    // Optionally clear after use
    // localStorage.removeItem('selectedTournamentId');
    // If a tournament is pre-selected, trigger standings load
    if (selectedId) {
      loadStandings();
    }
  }).catch(function(error) {
    showToast(error.message || 'Failed to load tournaments', 'error');
  });
}

function loadStandings() {
  var tournamentId = document.getElementById('standingsTournamentSelect').value;
  if (!tournamentId) {
    document.getElementById('standingsDisplay').innerHTML = '<div class="empty-state"><div class="empty-icon">S</div><h4>Select a tournament</h4><p>Choose a tournament to view standings.</p></div>';
    return;
  }

  apiRequest('/api/standings/calculate?tournamentId=' + encodeURIComponent(tournamentId))
    .then(function(standings) {
      renderStandings(standings || []);
    })
    .catch(function(error) {
      showToast(error.message || 'Failed to load standings', 'error');
    });
}

function renderStandings(standings) {
  var container = document.getElementById('standingsDisplay');
  if (!standings || standings.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">S</div><h4>No standings available</h4><p>Import players and submit results first.</p></div>';
    return;
  }

  var html = '<div class="card"><div class="card-header"><h3>Tournament Standings</h3></div><div class="card-body">';
  html += '<div class="table-wrapper"><table><thead><tr><th>#</th><th>Player</th><th>Rating</th><th>Points</th><th>W</th><th>D</th><th>L</th></tr></thead><tbody>';

  for (var i = 0; i < standings.length; i++) {
    var s = standings[i];
    var rowClass = '';
    if (s.rank === 1) rowClass = 'rank-1';
    else if (s.rank === 2) rowClass = 'rank-2';
    else if (s.rank === 3) rowClass = 'rank-3';

    html += '<tr class="' + rowClass + '">' +
      '<td><strong>' + s.rank + '</strong></td>' +
      '<td><strong>' + escapeHtml(s.playerName) + '</strong></td>' +
      '<td>' + s.rating + '</td>' +
      '<td><strong style="color:var(--accent-gold);">' + s.points + '</strong></td>' +
      '<td style="color:var(--success);">' + s.wins + '</td>' +
      '<td style="color:var(--info);">' + s.draws + '</td>' +
      '<td style="color:var(--danger);">' + s.losses + '</td>' +
      '</tr>';
  }

  html += '</tbody></table></div></div></div>';
  container.innerHTML = html;
}

document.addEventListener('DOMContentLoaded', function() {
  populateStandingsSelect();
});
</script>
